SearchDefinitions:
  moduleName: challan-services
  summary: Challan Services Inbox API
  version: 1.0.0
  definitions:
    - name: inboxchallansearch
      query:
        baseQuery: |
          Select row_to_json(result) from (
            select DISTINCT(challan.challanNo), 
                   pi.createdtime, 
                   pi.status as status_id, 
                   ws.state as status_name, 
                   ws.applicationStatus,
                   challan.id,
                   challan.accountid,
                   challan.tenantId,
                   challan.businessService,
                   challan.referenceId,
                   challan.applicationStatus as challan_application_status,
                   challan.taxPeriodFrom,
                   challan.taxPeriodTo,
                   challan.filestoreid,
                   challan.description,
                   challan.receiptnumber,
                   challan.challanStatus,
                   challan.offence_type_name,
                   challan.offence_category_name,
                   challan.offence_subcategory_name,
                   challan.challan_amount,
                   address.doorNo,
                   address.locality,
                   address.city,
                   address.pincode,
                   citizen.uuid as citizen_uuid,
                   citizen.primaryrole
            from eg_challan as challan
            LEFT JOIN eg_challanAddress address ON address.challanId = challan.id
            LEFT JOIN eg_challan_citizen citizen ON citizen.challanid = challan.id
            INNER JOIN eg_wf_processinstance_v2 pi ON pi.businessid = challan.challanNo
            LEFT JOIN eg_wf_state_v2 ws ON ws.uuid = pi.status
            LEFT JOIN eg_wf_assignee_v2 assg ON pi.id = assg.processinstanceid
            $where 
            AND pi.createdtime IN (
              select max(createdtime) 
              from eg_wf_processinstance_v2 wf 
              where wf.businessid = challan.challanNo 
              GROUP BY wf.businessid
            )
            order by pi.createdtime asc
            $pagination
          ) result
        groupBy:
        orderBy:
      searchParams:
        condition: AND
        params:
          - name: challan.tenantId
            isMandatory: true
            jsonPath: $.searchCriteria.tenantId
          - name: challan.id
            isMandatory: false
            jsonPath: $.searchCriteria.id
          - name: pi.status
            isMandatory: false
            jsonPath: $.searchCriteria.status
            operator: IN
          - name: challan.challanNo
            isMandatory: false
            jsonPath: $.searchCriteria.challanNumber
          - name: pi.businessservice
            isMandatory: false
            jsonPath: $.searchCriteria.businessservice
          - name: assg.assignee
            isMandatory: false
            jsonPath: $.searchCriteria.assignee
          - name: challan.challanStatus
            isMandatory: false
            jsonPath: $.searchCriteria.challanStatus
          - name: challan.accountid
            isMandatory: false
            jsonPath: $.searchCriteria.accountId
          - name: challan.referenceId
            isMandatory: false
            jsonPath: $.searchCriteria.referenceId
          - name: challan.receiptnumber
            isMandatory: false
            jsonPath: $.searchCriteria.receiptNumber
          - name: challan.offence_type_name
            isMandatory: false
            jsonPath: $.searchCriteria.offenceTypeName
          - name: challan.offence_category_name
            isMandatory: false
            jsonPath: $.searchCriteria.offenceCategoryName
          - name: challan.offence_subcategory_name
            isMandatory: false
            jsonPath: $.searchCriteria.offenceSubcategoryName
          - name: citizen.uuid
            isMandatory: false
            jsonPath: $.searchCriteria.citizenUuid
          - name: address.locality
            isMandatory: false
            jsonPath: $.searchCriteria.locality
        pagination:
          noOfRecords: $.searchCriteria.noOfRecords
          offset: $.searchCriteria.offset
      output:
        jsonFormat: {"ResponseInfo": {},"challanApplication": []}
        outJsonPath: $.challanApplication
        responseInfoPath: $.ResponseInfo

