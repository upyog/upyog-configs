    query: >
      -- Use CTE to force query plan, compute & use CTE later

      WITH current_holder AS (
         SELECT DISTINCT ON (wf.businessid)
           wf.businessid AS applicationno,
           u.name AS employee_name,
           e.code AS assignee_code,
           UPPER(st.applicationstatus) AS current_stage
         FROM eg_wf_processinstance_v2 wf
         JOIN eg_wf_state_v2 st ON wf.status = st.uuid
         LEFT JOIN eg_wf_assignee_v2 wa ON wf.id = wa.processinstanceid
         LEFT JOIN eg_user u ON u.uuid = wa.assignee
         LEFT JOIN eg_hrms_employee e ON e.uuid = wa.assignee
         WHERE wf.businessservice = 'ndc-services'
        ORDER BY wf.businessid, wf.lastmodifiedtime DESC
            ),
        unique_transactions AS (
           SELECT
              p.id AS transaction_id,
              p.createdtime,
              pd.amountpaid,
              CASE WHEN p.paymentmode IN ('CASH','OFFLINE_CASH') THEN pd.amountpaid ELSE 0 END AS cash_amount,
              CASE WHEN p.paymentmode IN ('CHEQUE') THEN pd.amountpaid ELSE 0 END AS cheque_amount,
              CASE WHEN p.paymentmode IN ('CARD','DEBIT_CARD','CREDIT_CARD','OFFLINE_CARD') THEN pd.amountpaid ELSE 0 END AS card_amount,
              CASE WHEN p.paymentmode IN ('DD') THEN pd.amountpaid ELSE 0 END AS dd_amount,
              CASE WHEN p.paymentmode IN ('NEFT','OFFLINE_NEFT') THEN pd.amountpaid ELSE 0 END AS neft_amount,
              CASE WHEN p.paymentmode IN ('RTGS','OFFLINE_RTGS','NEFT_RTGS') THEN pd.amountpaid ELSE 0 END AS rtgs_amount,
              CASE WHEN p.paymentmode = 'ONLINE' THEN pd.amountpaid ELSE 0 END AS online_amount,
              COALESCE(emp.code, 'SELF') AS collector_code,
              a.uuid AS ndc_id,
              a.applicationno,
              a.applicationstatus,
              u_applicant.name ,
              u_applicant.mobilenumber ,
              ch.employee_name AS assignee_employee,
              ch.assignee_code AS assignee_code ,
              split_part(p.tenantid, '.', 2) AS tenantid
             FROM egcl_paymentdetail pd
             JOIN egcl_payment p ON pd.paymentid = p.id
             JOIN egcl_bill bill ON bill.id = pd.billid
             JOIN eg_ndc_application a ON bill.consumercode = a.applicationno
             LEFT JOIN eg_ndc_owner o ON o.ndcapplicationuuid = a.uuid
             LEFT JOIN eg_user u_applicant ON u_applicant.uuid = o.uuid
             LEFT JOIN eg_ndc_details d ON d.applicationid = a.uuid
             LEFT JOIN eg_user u ON u.id::text = p.createdby::text
             LEFT JOIN eg_hrms_employee emp ON emp.uuid::text = u.uuid::text
             LEFT JOIN current_holder ch ON ch.applicationno = a.applicationno
             WHERE pd.businessservice = 'NDC'
             AND p.paymentstatus != 'CANCELLED'
                 )
         SELECT *
          FROM (
           SELECT
              applicationno, name, mobilenumber, 'NDC' AS businessservice, applicationstatus,
              collector_code, cash_amount, cheque_amount,tenantid,createdtime,
              card_amount, dd_amount, neft_amount, rtgs_amount, online_amount, amountpaid,
              to_char(to_timestamp(createdtime / 1000),'DD-MM-YYYY HH24:MI:SS') AS PaymentDate,
              ROW_NUMBER() OVER ( PARTITION BY applicationno
              ORDER BY createdtime DESC) AS rn
             FROM unique_transactions
             WHERE tenantid not in ('testing') )t
             where rn=1
    orderby: ORDER BY createdtime DESC
  - reportName: StateSLAReport
    decryptionPathId: STATENDCAPPLICATION
    summary: SLA report for NDC service
    version: 1.0.0
    moduleName: rainmaker-ndc
    additionalConfig:
      print:
        pdfPageSize: A1
    sourceColumns:
      - name: tenantid
        label: tenantid
        type: string
        source: ndc
        total: false
      - name: ndc_application_no
        label: Application Number
        type: string
        source: ndc
        total: false
      - name: document_verify_on
        label: Document Verified On
        type: string
        source: ndc
        total: false
      - name: finalstatus_on
        label: Approval / Rejection On
        type: string
        source: ndc
        total: false
      - name: final_status
        label: Application status
        type: string
        source: ndc
        total: false
      - name: sla_status
        label: sla status
        type: string
        source: ndc
        total: false
      - name: sla_days
        label: SLA Days
        type: string
        source: ndc
        total: false
      - name: employee_name
        label: employee_name
        type: string
        source: ndc
        total: false
      - name: employee_code
        label: Employee Code / Current Holder Code
        type: string
        source: ndc
        total: false
    searchParams:
      - name: fromDate
        label: From Date
        type: epoch
        source: ndc
        isMandatory: true
        searchClause: AND n.createdtime >= $fromDate
      - name: toDate
        label: To Date
        type: epoch
        source: ndc
        isMandatory: true
        searchClause: AND n.createdtime <= $toDate
      - name: ulb
        label: ulb
        type: singlevaluelist
        pattern: http://egov-mdms-service:8080/egov-mdms-service/v1/_get?tenantId=$tenantid&moduleName=tenant&masterName=tenants|$.MdmsRes.tenant.tenants.*.code|$.MdmsRes.tenant.tenants.*.name
        source: ndc
        isMandatory: false
        searchClause: AND n.tenantid = $ulb
    query: >
      -- Use CTE to force query plan, compute & use CTE later     
       WITH wf_detailed AS (
         SELECT 
           wf.businessid AS uuid,                                 
           UPPER(st.applicationstatus) AS applicationstatus,
           wf.createdtime,
           wf.lastmodifiedtime,
           wf.businessservicesla,
           wf.tenantid,
           wf.id AS processinstanceid
          FROM eg_wf_processinstance_v2 wf
          JOIN eg_wf_state_v2 st ON wf.status = st.uuid
          WHERE wf.businessservice = 'ndc-services'                    
          ),
        status_times AS (
             SELECT
                uuid,
                MAX(CASE WHEN applicationstatus = 'DOCUMENTVERIFY' THEN createdtime END) AS docverify_time,
                MAX(CASE WHEN applicationstatus IN ('APPROVED','REJECTED') THEN lastmodifiedtime END) AS final_time
              FROM wf_detailed
              GROUP BY uuid
             ),
        latest_status AS (
              SELECT uuid, applicationstatus
                 FROM (
                      SELECT uuid, applicationstatus, lastmodifiedtime,
                         ROW_NUMBER() OVER (PARTITION BY uuid ORDER BY lastmodifiedtime DESC NULLS LAST) AS rn
                          FROM wf_detailed
                        ) x WHERE rn = 1
                     ),
        sla_data AS (
            SELECT businessservice,businessservicesla
            FROM eg_wf_businessservice_v2
            WHERE businessservice = 'ndc-services'
           ),
        assignee_details AS (
             SELECT DISTINCT ON (wf.businessid)
                 wf.businessid,
                 e.code AS employee_code,
                 u.name AS employee_name
              FROM eg_wf_processinstance_v2 wf
              JOIN eg_wf_assignee_v2 wa ON wf.id = wa.processinstanceid
              JOIN eg_hrms_employee e ON e.uuid = wa.assignee
              JOIN eg_user u ON e.uuid = u.uuid
               WHERE wf.businessservice = 'ndc-services'
              ORDER BY wf.businessid,wf.lastmodifiedtime DESC
               )
         SELECT
            split_part(n.tenantid,'.',2) AS tenantid,
             n.applicationno AS ndc_application_no,                 
             UPPER(ls.applicationstatus) AS final_status,
            TO_CHAR(TO_TIMESTAMP(st.docverify_time/1000),'DD-MM-YYYY') AS document_verify_on,
            TO_CHAR(TO_TIMESTAMP(st.final_time/1000),'DD-MM-YYYY') AS finalstatus_on,   
            CASE
              WHEN st.final_time IS NOT NULL AND st.docverify_time IS NOT NULL
               THEN FLOOR((st.final_time-st.docverify_time)/86400000)
              WHEN st.docverify_time IS NOT NULL AND st.final_time IS NULL
               THEN FLOOR((EXTRACT(EPOCH FROM NOW())*1000-st.docverify_time)/86400000)
             ELSE NULL
            END AS sla_days,
            CASE
               WHEN st.final_time IS NOT NULL AND st.docverify_time IS NOT NULL THEN
            CASE WHEN (st.final_time-st.docverify_time) > sla.businessservicesla THEN 'BREACHED'
                 ELSE 'MET' END
                WHEN st.docverify_time IS NOT NULL AND st.final_time IS NULL
                THEN 'IN-PROGRESS'
               ELSE 'AWAITING DOCVERIFY'
            END AS sla_status,
            ad.employee_name AS employee_name,
            ad.employee_code AS employee_code
            FROM eg_ndc_application n
            LEFT JOIN status_times st ON n.applicationno = st.uuid
            LEFT JOIN latest_status ls ON n.applicationno = ls.uuid
            JOIN sla_data sla ON sla.businessservice='ndc-services'
            LEFT JOIN assignee_details ad ON n.applicationno = ad.businessid
            WHERE UPPER(ls.applicationstatus) NOT IN ('APPLY','INITIATED','PENDINGPAYMENT') and tenantid not in ('pb.testing')          
    orderby: ORDER BY n.createdtime DESC, tenantid, final_status
