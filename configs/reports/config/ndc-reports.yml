  - reportName: OverallSummaryReport
    summary: Details of applicant in No Due Certificate , Venue Booking, Pet service
    version: 1.0.0
    moduleName: rainmaker-ndc
    additionalConfig:
      print:
        pdfPageSize: A1
    sourceColumns:
      - name: tenant_name
        label: ULB Name
        type: string
        source: ndc
        total: false
      - name: service
        label: Service
        type: string
        source: ndc
        total: false
      - name: application_status
        label: Application Status
        type: string
        source: ndc
        total: false
      - name: application_count
        label: Application Count
        type: string
        source: ndc
        total: false
    searchParams:
      - name: fromDate
        label: From Date
        type: epoch
        source: ndc
        isMandatory: false
        searchClause: AND createdtime >= $fromDate
      - name: toDate
        label: To Date
        type: epoch
        source: ndc
        isMandatory: false
        searchClause: AND createdtime <= $toDate
      - name: service
        label: Service
        type: singlevaluelist
        pattern: list://Venue Booking:Venue Booking,No Due Certificate:No Due Certficate,Pet Registration:Pet Registration,CHALLAN:Challan
        source: ndc
        isMandatory: true
        searchClause: AND 1=1
    query: |
      WITH all_services AS (
      
        /* ---------------- CHB ---------------- */
        SELECT
          split_part(b.tenant_id, '.', 2) AS tenant_name,
          b.tenant_id                     AS tenantid,
          'Venue Booking'                 AS service,
          b.booking_status                AS application_status,
          COUNT(*)                        AS application_count,
          MIN(b.createdtime)              AS createdtime
        FROM eg_chb_booking_detail b
        where 1=1
      
        UNION ALL
      
        /* ---------------- NDC ---------------- */
        SELECT
          split_part(a.tenantid, '.', 2) AS tenant_name,
          a.tenantid                     AS tenantid,
          'No Due Certificate'           AS service,
          a.applicationstatus            AS application_status,
          COUNT(*)                       AS application_count,
          MIN(a.createdtime)             AS createdtime
        FROM eg_ndc_application a
        where 1=1
      
        UNION ALL
      
        /* ---------------- PTR ---------------- */
        SELECT
          split_part(r.tenantid, '.', 2) AS tenant_name,
          r.tenantid                     AS tenantid,
          'Pet Registration'             AS service,
          r.status                       AS application_status,
          COUNT(*)                       AS application_count,
          MIN(r.createdtime)             AS createdtime
        FROM eg_ptr_registration r
        where 1=1

         UNION ALL

       /* ---------------- CHALLAN ---------------- */
        SELECT
          split_part(c.tenantid, '.', 2) AS tenant_name,
          c.tenantid                     AS tenantid,
          'CHALLAN'                      AS service,
          c.applicationstatus            AS application_status,
          COUNT(*)                       AS application_count,
          MIN(c.createdtime)             AS createdtime
          FROM eg_challan c
          GROUP BY tenantid, tenant_name, service, application_status
       )
      
      SELECT
        tenant_name,
        service,
        application_status,
        SUM(application_count)       AS application_count
      FROM all_services
      WHERE tenant_name not in ('testing') and service = $service
    groupby: GROUP BY tenantid, tenant_name, service, application_status
    orderby: ORDER BY tenant_name, service, application_status;
      
  - reportName: Employeewisependingreport
    decryptionPathId: STATENDCAPPLICATION
    summary: Details of applicant in ndc , chb, pet service
    version: 1.0.0
    moduleName: rainmaker-ndc
    additionalConfig:
      print:
        pdfPageSize: A1
    sourceColumns:
      - name: tenant_name
        label: tenant_name
        type: string
        source: ndc
        total: false
      - name: service
        label: service
        type: string
        source: ndc
        total: false
      - name: application_status
        label: application_status
        type: string
        source: ndc
        total: false
      - name: application_count
        label: application_count
        type: string
        source: ndc
        total: false
      - name: pending_with_employee
        label: pending_with_employee
        type: string
        source: ndc
        total: false
    searchParams:
      - name: fromDate
        label: fromDate
        type: epoch
        source: ndc
        isMandatory: true
        searchClause: AND createdtime >= $fromDate
      - name: toDate
        label: toDate
        type: epoch
        source: ndc
        isMandatory: true
        searchClause: AND  createdtime <= $toDate
      - name: ulb
        label: ulb
        type: singlevaluelist
        pattern: http://egov-mdms-service:8080/egov-mdms-service/v1/_get?tenantId=$tenantid&moduleName=tenant&masterName=tenants|$.MdmsRes.tenant.tenants.*.code|$.MdmsRes.tenant.tenants.*.name
        source: ndc
        isMandatory: false
        searchClause: and tenantid =  $ulb
      - name: service
        label: service
        type: singlevaluelist
        pattern: list://NDC:No Due Certficate,PTR:Pet Registration
        source: ndc
        isMandatory: true
        searchClause: AND  1=1
    query: >
      WITH current_holder AS (
       SELECT DISTINCT ON (wf.businessid)
          wf.businessid           AS applicationnumber,
          wf.businessservice      AS service,
          u.name                  AS assignee_employee
        FROM eg_wf_processinstance_v2 wf
        LEFT JOIN eg_wf_assignee_v2 wa ON wf.id = wa.processinstanceid
        LEFT JOIN eg_user u ON u.uuid = wa.assignee
        ORDER BY wf.businessid, wf.lastmodifiedtime DESC
       )
       SELECT
          tenant_name,
          service,
          application_status,
          COALESCE(assignee_employee) AS pending_with_employee,
          COUNT(*) AS application_count,
          MAX(createdtime) AS latest_createdtime
       FROM (
          /* ---------------- NDC ---------------- */
        SELECT 
           split_part(a.tenantid, '.', 2) AS tenant_name,
           a.tenantid                     AS tenantid,
           'NDC'                          AS service,
           a.applicationstatus            AS application_status,
           ch.assignee_employee           AS assignee_employee,
           MAX(a.createdtime) AS createdtime
          FROM eg_ndc_application a 
          LEFT JOIN current_holder ch ON ch.applicationnumber = a.applicationno AND ch.service = 'ndc-services'
      where a.applicationstatus not in ('APPROVED','INITIATED','PENDINGPAYMENT','REJECTED','CITIZENACTIONREQUIRED')

      UNION ALL
           /* ---------------- PTR ---------------- */
      SELECT
       split_part(r.tenantid, '.', 2) AS tenant_name,
       r.tenantid                     AS tenantid,
       'PTR'                          AS service,
       r.status                       AS application_status,
       ch.assignee_employee           AS assignee_employee,
       r.createdtime                  AS createdtime
       FROM eg_ptr_registration r
       LEFT JOIN current_holder ch ON ch.applicationnumber = r.applicationnumber AND ch.service = 'ptr'
      where r.status not in ('APPROVED','INITIATED','PENDINGPAYMENT' ,'REJECTED','CITIZENACTIONREQUIRED','RENEWED')
       ) all_services 
             WHERE
      service = $service and tenant_name not in ('testing')
    groupby: GROUP BY tenant_name, tenantid, service, application_status, assignee_employee 
    orderby: ORDER BY tenant_name, tenantid, service, application_status, assignee_employee;

  - reportName: ULB_Wise_Applicationcount
    summary: ULB Wise Application Count of No Dues Certificate issuance,Rent and Lease Collection,Pet Registration,Advertisement & Hoardings,Garbage Collection Fee Management,Community Centre Booking,Challan Generation
    version: 1.0.0
    moduleName: rainmaker-ndc
    additionalConfig:
      print:
        pdfPageSize: A1
    sourceColumns:
      - name: tenantid
        label: tenantid
        type: string
        source: ndc
        total: false
      - name: CHB
        label: CHB
        type: string
        source: ndc
        total: true
      - name: NDC
        label: NDC
        type: string
        source: ndc
        total: true
      - name: Pet_Registration
        label: Pet_Registration
        type: string
        source: ndc
        total: true
      - name: Challan
        label: Challan
        type: string
        source: ndc
        total: true
      - name: Advertisement
        label: Advertisement
        type: string
        source: ndc
        total: true
      - name: Garbage_Collection
        label: Garbage_Collection
        type: string
        source: ndc
        total: true
      - name: Rent_and_Lease
        label: Rent_and_Lease
        type: string
        source: ndc
        total: true
    query: >
      SELECT 
          tenantid,
      
          SUM(CASE WHEN service = 'CHB' THEN 1 ELSE 0 END) AS CHB,
          SUM(CASE WHEN service = 'NDC' THEN 1 ELSE 0 END) AS NDC,
          SUM(CASE WHEN service = 'PTR' THEN 1 ELSE 0 END) AS Pet_Registration,
          SUM(CASE WHEN service = 'CHALLAN' THEN 1 ELSE 0 END) AS Challan,
          SUM(CASE WHEN service = 'ADV' THEN 1 ELSE 0 END) AS Advertisement,
          SUM(CASE WHEN service = 'GC' THEN 1 ELSE 0 END) AS Garbage_Collection,
          SUM(CASE WHEN service = 'RL' THEN 1 ELSE 0 END) AS Rent_and_Lease 
      
      FROM (
      
          SELECT tenant_id AS tenantid, 'CHB' AS service FROM eg_chb_booking_detail
          UNION ALL
          SELECT tenantid, 'NDC' FROM eg_ndc_application
          UNION ALL
          SELECT tenantid, 'PTR' FROM eg_ptr_registration
          UNION ALL
          SELECT tenantid, 'CHALLAN' FROM eg_challan
          UNION ALL
          SELECT tenant_id, 'ADV' FROM eg_adv_booking_detail
          UNION ALL
          SELECT tenantid, 'GC' FROM eg_gc_connection
          UNION ALL
          SELECT tenant_id, 'RL' FROM eg_rl_allotment
      
      ) t
      
    groupby: GROUP BY tenantid
    orderby: ORDER BY tenantid;