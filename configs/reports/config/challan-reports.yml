        source: ch
        isMandatory: false
        searchClause: AND c.createdtime <= $toDate
      - name: offence_category_name
        label: Offence Category Name
        type: singlevaluelist
        pattern: list://Solid Waste Management:Solid Waste Management
        source: ch
        isMandatory: false
        searchClause: AND c.offence_category_name = $offence_category_name
      - name: offence_subcategory_name
        label: Offence Subcategory Name
        type: singlevaluelist
        pattern: list://Littering of Waste:Littering of Waste,Open Defecation:Open
          Defecation,Plastic:Plastic,Burning of Waste:Burning of Waste
        source: ch
        isMandatory: false
        searchClause: AND c.offence_subcategory_name = $offence_subcategory_name
      - name: challanstatus
        label: Challan Status
        type: singlevaluelist
        pattern: list://CHALLAN_GENERATED:Challan Generated,CLOSURE:Closed,PENDING_FOR_SETTLEMENT:Pending for Settlement
        source: ch
        isMandatory: false
        searchClause: AND c.challanstatus = $challanstatus
    query: >
      SELECT c.challanno , c.businessservice , c.applicationstatus , c.receiptnumber ,
         c.challanstatus , c.offence_type_name , c.offence_category_name , c.offence_subcategory_name , 
         c.challan_amount , c.tenantid , ca.addressline1 , u.name , u.mobilenumber 
         from eg_challan c
         LEFT JOIN eg_challanaddress ca on ca.challanid = c.id
         LEFT JOIN eg_user u on u.uuid = c.accountid
         WHERE 1=1
