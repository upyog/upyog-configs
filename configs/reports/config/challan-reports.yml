  - reportName: ChallanSummaryReport
    summary: Summary of challan application with status and total collection per category per tenant.
    version: 1.0.0
    moduleName: rainmaker-ch
    additionalConfig:
      print:
        pdfPageSize: A1
    sourceColumns:
      - name: ulb
        label: Tenant Id
        type: string
        source: ch
        total: false
      - name: offence_category_name
        label: Offence Category Name
        type: string
        source: ch
        total: false
      - name: total_applications
        label: Total Applications
        type: string
        source: ch
        total: true
      - name: challan_generated
        label: Challan Generated
        type: string
        source: ch
        total: true
      - name: pending_for_settlement
        label: Pending for Settlement
        type: string
        source: ch
        total: true
      - name: closure
        label: Closure
        type: string
        source: ch
        total: true
      - name: total_collection
        label: Total Collection
        type: string
        source: ch
        total: true
    searchParams:
      - name: fromDate
        label: From Date
        type: epoch
        source: ch
        isMandatory: false
        searchClause: AND c.createdtime>= $fromDate
      - name: toDate
        label: To Date
        type: epoch
        source: ch
        isMandatory: false
        searchClause: AND c.createdtime <= $toDate
    query: >
     WITH challan_data AS (
     SELECT
        c.challanno,c.offence_category_name, c.applicationstatus, c.tenantid,
        c.createdtime,c.challanstatus
        FROM eg_challan c
        WHERE c.tenantid=$tenantid
        ),
     payment_data AS (
       SELECT
        bill.consumercode AS challanno, pd.amountpaid
        FROM egcl_paymentdetail pd
        JOIN egcl_payment p ON p.id = pd.paymentid
        JOIN egcl_bill bill ON bill.id = pd.billid
        WHERE pd.businessservice = 'Challan_Generation'
        AND p.paymentstatus != 'CANCELLED'
        )
     SELECT
       split_part(c.tenantid,'.',2) AS ulb, c.offence_category_name,
       COUNT(c.challanno) AS total_applications,
       COUNT( CASE WHEN c.challanstatus = 'CHALLAN_GENERATED' THEN 1 END) AS challan_generated,
       COUNT( CASE WHEN c.challanstatus = 'PENDING_FOR_SETTLEMENT' THEN 1 END ) AS pending_for_settlement,
       COUNT( CASE WHEN c.challanstatus = 'CLOSURE' THEN 1 END) AS closure,
       COALESCE(SUM(p.amountpaid),0) AS total_collection
       FROM challan_data c
       LEFT JOIN payment_data p ON p.challanno = c.challanno
       WHERE 1=1
    groupby: GROUP BY split_part(c.tenantid,'.',2),c.offence_category_name
    orderby: ORDER BY  ulb,  offence_category_name;

